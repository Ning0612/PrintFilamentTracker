<tr id="ptf-row-{{ ptf_id }}" class="mapped-row">
  <td colspan="5" style="color:var(--pico-muted-color);">已 mapping</td>
  <td>
    {% if spool %}
    <span class="color-swatch" style="background:{{ spool.color_hex or '#ccc' }};"></span>
    [{{ spool.id }}] {{ spool.color_name or spool.color_hex or '-' }} {{ spool.material or '' }}
    {% endif %}
  </td>
  <td><span style="color:green;">✓</span></td>
</tr>
